name: release

# Build prebuilt binaries and attach them to a GitHub Release whenever a
# version tag is pushed. The asset names here must match what install.sh expects:
#   tudo-<target>.tar.gz   (containing a single `tudo` binary at the archive root)
#
# Cut a release with:
#   git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14   # cross-compiled from Apple Silicon; Intel macos-13 runners are retired
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          staging="tudo-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/tudo" "$staging/"
          tar -czf "$staging.tar.gz" -C "$staging" tudo

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          files: tudo-${{ matrix.target }}.tar.gz
